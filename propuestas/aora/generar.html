<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Generar propuesta AORA</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f4f4f2;color:#0a0a0a;padding:20px;min-height:100vh}
.wrap{max-width:520px;margin:0 auto}
.back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:#8a8a8a;text-decoration:none;margin-bottom:20px}
h1{font-size:22px;font-weight:700;margin-bottom:4px}
h1 em{color:#C8102E;font-style:normal}
.sub{font-size:13px;color:#8a8a8a;margin-bottom:24px}
.card{background:#fff;border-radius:12px;padding:20px;border:1px solid #e8e8e5;margin-bottom:14px}
.card-title{font-size:10px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:#8a8a8a;margin-bottom:14px}
label{font-size:13px;font-weight:600;display:block;margin-bottom:6px}
input{width:100%;padding:11px 14px;border:1.5px solid #e8e8e5;border-radius:8px;font-size:14px;font-family:'Inter',sans-serif;outline:none;transition:border-color .15s}
input:focus{border-color:#0a0a0a}

/* chips filtros */
.chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:7px 14px;border:1.5px solid #e8e8e5;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:#666;transition:all .15s;user-select:none;-webkit-tap-highlight-color:transparent}
.chip.on{background:#0a0a0a;color:#fff;border-color:#0a0a0a}
.chip.on-green{background:#1a6b3a;color:#fff;border-color:#1a6b3a}

/* lista unidades */
.u-list{display:flex;flex-direction:column;gap:6px;margin-top:12px}
.u-row{
  display:flex;align-items:center;gap:12px;
  padding:12px 14px;border:1.5px solid #e8e8e5;border-radius:8px;
  cursor:pointer;background:#fff;transition:border-color .15s;
  -webkit-tap-highlight-color:transparent;
}
.u-row.sel{border-color:#0a0a0a}
.u-check{width:20px;height:20px;border-radius:4px;border:1.5px solid #e8e8e5;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.u-row.sel .u-check{background:#0a0a0a;border-color:#0a0a0a}
.checkmark{display:none}
.u-row.sel .checkmark{display:block}
.u-info{flex:1;min-width:0}
.u-nom{font-size:13px;font-weight:600;margin-bottom:2px}
.u-det{font-size:11px;color:#8a8a8a}
.u-precio{font-size:13px;font-weight:700;white-space:nowrap;text-align:right}
.az-tag{font-size:9px;font-weight:700;background:#e8f5ee;color:#1a6b3a;padding:2px 6px;border-radius:6px;margin-left:5px;vertical-align:middle}

.footer-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.sel-info{font-size:12px;color:#8a8a8a}
.sel-all{font-size:12px;font-weight:600;cursor:pointer;color:#0a0a0a;text-decoration:underline;background:none;border:none;font-family:'Inter',sans-serif;padding:0}

/* botón generar */
.btn-gen{
  width:100%;padding:15px;background:#0a0a0a;color:#fff;border:none;
  border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;
  font-family:'Inter',sans-serif;margin-top:8px;transition:opacity .15s;
}
.btn-gen:disabled{opacity:.35;cursor:not-allowed}
.btn-gen:not(:disabled):hover{opacity:.88}

/* resultado */
.result{display:none;background:#0a0a0a;border-radius:12px;padding:20px;margin-top:16px;color:#fff}
.result.show{display:block}
.result-label{font-size:10px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.45);margin-bottom:10px}
.result-url{font-size:12px;color:rgba(255,255,255,0.65);word-break:break-all;background:rgba(255,255,255,0.07);padding:10px 12px;border-radius:6px;margin-bottom:14px}
.result-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.btn-copy,.btn-wa{padding:13px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;border:none;font-family:'Inter',sans-serif;transition:opacity .15s}
.btn-copy{background:#fff;color:#0a0a0a}
.btn-wa{background:#25D366;color:#fff}
.btn-copy:hover,.btn-wa:hover{opacity:.88}
</style>
</head>
<body>
<div class="wrap">
  <a href="../../index.html" class="back">← Volver al CRM</a>
  <h1>Propuesta <em>AORA</em></h1>
  <div class="sub">Elegí las unidades y generá el link para tu cliente.</div>

  <!-- NOMBRE -->
  <div class="card">
    <div class="card-title">Cliente</div>
    <label>Nombre</label>
    <input id="nombre" type="text" placeholder="Ej: Jaqueline" autocomplete="off">
  </div>

  <!-- FILTROS -->
  <div class="card">
    <div class="card-title">Filtrar</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <div>
        <div style="font-size:11px;font-weight:600;color:#8a8a8a;margin-bottom:6px">AMBIENTES</div>
        <div class="chips" id="fAmb">
          <span class="chip on" data-v="todos">Todos</span>
          <span class="chip" data-v="2">2 amb</span>
          <span class="chip" data-v="3">3 amb</span>
        </div>
      </div>
      <div>
        <div style="font-size:11px;font-weight:600;color:#8a8a8a;margin-bottom:6px">TIPOLOGÍA</div>
        <div class="chips" id="fTipo">
          <span class="chip on" data-v="todos">Todas</span>
          <span class="chip" data-v="T1">PB+4</span>
          <span class="chip" data-v="T2">PB+2 · T2</span>
          <span class="chip" data-v="T3">PB+2 · T3</span>
        </div>
      </div>
      <div>
        <div style="font-size:11px;font-weight:600;color:#8a8a8a;margin-bottom:6px">PISO</div>
        <div class="chips" id="fPiso">
          <span class="chip on" data-v="todos">Todos</span>
          <span class="chip on-green" data-v="azotea">▲ Azoteas</span>
        </div>
      </div>
    </div>
  </div>

  <!-- UNIDADES -->
  <div class="card">
    <div class="footer-bar">
      <div class="card-title" style="margin:0">Unidades</div>
      <button class="sel-all" onclick="toggleAll()">Seleccionar todas</button>
    </div>
    <div class="u-list" id="uList"></div>
    <div class="sel-info" id="selInfo" style="margin-top:10px">0 seleccionadas</div>
  </div>

  <button class="btn-gen" id="btnGen" onclick="generar()" disabled>Generar propuesta →</button>

  <div class="result" id="result">
    <div class="result-label">Link generado</div>
    <div class="result-url" id="resultUrl"></div>
    <div class="result-btns">
      <button class="btn-copy" onclick="copiar()">Copiar link</button>
      <button class="btn-wa" onclick="enviarWA()">WhatsApp</button>
    </div>
  </div>
</div>

<script>
const U = [
  // ── T1 · Edificio 1 ──
  [2,'Edificio 1','T1','1° Piso','B',2,60.9,148639,'plano_t1_2amb_b_rot'],
  [77,'Edificio 1','T1','Azotea','D',2,67.96,176646,'plano_t1_az_2amb_rot'],
  // ── T1 · Edificio 2 ──
  [29,'Edificio 2','T1','Azotea','B',3,87.5,211467,'plano_t1_az_3amb_b_rot'],
  [78,'Edificio 2','T1','Azotea','D',2,67.96,176646,'plano_t1_az_2amb_rot'],
  // ── T1 · Edificio 3 ──
  [31,'Edificio 3','T1','1° Piso','A',2,60.7,148197,'plano_t1_2amb_a_rot'],
  [32,'Edificio 3','T1','1° Piso','B',2,60.9,148639,'plano_t1_2amb_b_rot'],
  // ── T1 · Edificio 4 ──
  [80,'Edificio 4','T1','1° Piso','A',2,60.7,148197,'plano_t1_2amb_a_rot'],
  [85,'Edificio 4','T1','2° Piso','B',2,60.9,151387,'plano_t1_2amb_b_rot'],
  [89,'Edificio 4','T1','3° Piso','B',2,61.2,157587,'plano_t1_2amb_b_rot'],
  [92,'Edificio 4','T1','Azotea','A',2,67.8,176168,'plano_t1_az_2amb_rot'],
  [95,'Edificio 4','T1','Azotea','D',2,67.96,176646,'plano_t1_az_2amb_rot'],
  // ── T2 · Edificio 1 ──
  [46,'Edif.1 T2','T2','Planta Baja','A',2,75.9,185457,'plano_t2_pb_rot'],
  [51,'Edif.1 T2','T2','1° Piso','D',3,79.3,182909,'plano_t2_p1d_rot'],
  [53,'Edif.1 T2','T2','Azotea','B',3,95.4,223320,'plano_t2_az_b_rot'],
  [55,'Edif.1 T2','T2','Azotea','C',2,67.2,170299,'plano_t2_az_c_rot'],
  // ── T3 · Edificio 2 ──
  [57,'Edif.2 T3','T3','Planta Baja','A',2,71.5,175455,'plano_t3_pb_rot'],
  [58,'Edif.2 T3','T3','1° Piso','A',2,60.7,150936,'plano_t3_p1a_rot'],
  [63,'Edif.2 T3','T3','Azotea','B',2,66.9,169601,'plano_t3_az_b_rot'],
  // ── T2 · Edificio 3 ──
  [66,'Edif.3 T2','T2','Planta Baja','A',2,75.9,185457,'plano_t2_pb_rot'],
  // ── T1 · Edificio 5 ──
  [96,'Edificio 5','T1','1° Piso','A',2,60.7,140601,'plano_t1_2amb_a_rot'],
  [97,'Edificio 5','T1','1° Piso','B',2,60.9,143611,'plano_t1_2amb_b_rot'],
  [100,'Edificio 5','T1','2° Piso','A',2,60.7,143185,'plano_t1_2amb_a_rot'],
  [101,'Edificio 5','T1','2° Piso','B',2,60.9,146203,'plano_t1_2amb_b_rot'],
  [104,'Edificio 5','T1','3° Piso','A',2,60.7,145768,'plano_t1_2amb_a_rot'],
  [105,'Edificio 5','T1','3° Piso','B',2,61.2,149459,'plano_t1_2amb_b_rot'],
  [108,'Edificio 5','T1','Azotea','A',2,67.8,164102,'plano_t1_az_2amb_rot'],
  [111,'Edificio 5','T1','Azotea','D',2,67.96,164545,'plano_t1_az_2amb_rot'],
  // ── T1 · Edificio 6 ──
  [112,'Edificio 6','T1','1° Piso','A',2,60.7,140601,'plano_t1_2amb_a_rot'],
  [113,'Edificio 6','T1','1° Piso','B',2,60.9,143611,'plano_t1_2amb_b_rot'],
  [116,'Edificio 6','T1','2° Piso','A',2,60.7,143185,'plano_t1_2amb_a_rot'],
  [117,'Edificio 6','T1','2° Piso','B',2,60.9,146203,'plano_t1_2amb_b_rot'],
  [121,'Edificio 6','T1','3° Piso','B',2,61.2,149459,'plano_t1_2amb_b_rot'],
  [124,'Edificio 6','T1','Azotea','A',2,67.8,164102,'plano_t1_az_2amb_rot'],
  [127,'Edificio 6','T1','Azotea','D',2,67.96,164545,'plano_t1_az_2amb_rot'],
  // ── T3 · Edificio 4 ──
  [128,'Edif.4 T3','T3','Planta Baja','A',2,71.5,166316,'plano_t3_pb_rot'],
  [129,'Edif.4 T3','T3','1° Piso','A',2,60.7,143185,'plano_t3_p1a_rot'],
  [130,'Edif.4 T3','T3','1° Piso','B',2,60.9,143611,'plano_t3_p1b_rot'],
  [133,'Edif.4 T3','T3','Azotea','A',2,66.7,160355,'plano_t3_az_a_rot'],
  [134,'Edif.4 T3','T3','Azotea','B',2,66.9,160794,'plano_t3_az_b_rot'],
  // ── T2 · Edificio 5 ──
  [137,'Edif.5 T2','T2','Planta Baja','A',2,71.5,166316,'plano_t2_pb_rot'],
  [140,'Edif.5 T2','T2','1° Piso','C',2,59.4,140416,'plano_t2_p1c_rot'],
  [142,'Edif.5 T2','T2','Azotea','A',2,68.8,164853,'plano_t2_az_a_rot'],
  [144,'Edif.5 T2','T2','Azotea','C',2,67.2,161452,'plano_t2_az_c_rot'],
];

const fU = n => 'USD ' + n.toLocaleString('es-AR');
let sel = new Set();
let fAmb='todos', fTipo='todos', fPiso='todos';

function filtered(){
  return U.filter(u => {
    if(fAmb!=='todos' && u[5]!==parseInt(fAmb)) return false;
    if(fTipo!=='todos' && u[2]!==fTipo) return false;
    if(fPiso==='azotea' && u[3]!=='Azotea') return false;
    return true;
  });
}

function render(){
  const arr = filtered();
  document.getElementById('uList').innerHTML = arr.map(u => {
    const [uf,edif,tipo,piso,dpto,amb,tv,pt] = u;
    const isAz = piso==='Azotea';
    const on = sel.has(uf);
    return `<div class="u-row${on?' sel':''}" onclick="toggle(${uf})">
      <div class="u-check">
        <svg class="checkmark" width="11" height="9" viewBox="0 0 11 9" fill="none">
          <path d="M1 4l3 3 6-6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="u-info">
        <div class="u-nom">UF ${uf} · ${piso} · Dpto ${dpto}${isAz?'<span class="az-tag">▲ AZOTEA</span>':''}</div>
        <div class="u-det">${amb} amb · ${tipo} · ${edif} · ${tv} m²</div>
      </div>
      <div class="u-precio">${fU(pt)}</div>
    </div>`;
  }).join('');
  const n = sel.size;
  document.getElementById('selInfo').textContent = n + ' unidad'+(n===1?'':'es')+' seleccionada'+(n===1?'':'s');
  document.getElementById('btnGen').disabled = n === 0;
}

function toggle(uf){
  sel.has(uf) ? sel.delete(uf) : sel.add(uf);
  render();
}

function toggleAll(){
  const arr = filtered();
  const allOn = arr.every(u => sel.has(u[0]));
  arr.forEach(u => allOn ? sel.delete(u[0]) : sel.add(u[0]));
  render();
}

// Chips
['fAmb','fTipo','fPiso'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => {
    const chip = e.target.closest('.chip');
    if(!chip) return;
    const grp = document.getElementById(id);
    grp.querySelectorAll('.chip').forEach(c => c.classList.remove('on','on-green'));
    chip.classList.add(chip.dataset.v==='azotea' ? 'on-green' : 'on');
    if(id==='fAmb') fAmb = chip.dataset.v;
    if(id==='fTipo') fTipo = chip.dataset.v;
    if(id==='fPiso') fPiso = chip.dataset.v;
    render();
  });
});

let _url = '';

function generar(){
  const nombre = document.getElementById('nombre').value.trim() || 'cliente';
  const ufs = Array.from(sel).sort((a,b)=>a-b).join(',');
  const base = 'https://joaquingbenegas-cloud.github.io/crm-tizado/propuestas/aora/index.html';
  _url = base + '?nombre=' + encodeURIComponent(nombre) + '&ufs=' + ufs;
  document.getElementById('resultUrl').textContent = _url;
  document.getElementById('result').classList.add('show');
  document.getElementById('result').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function copiar(){
  navigator.clipboard.writeText(_url).then(() => {
    const btn = document.querySelector('.btn-copy');
    const orig = btn.textContent;
    btn.textContent = '✓ Copiado';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}

function enviarWA(){
  const nombre = document.getElementById('nombre').value.trim() || '';
  const saludo = nombre ? 'Hola ' + nombre + '! ' : '';
  const msg = encodeURIComponent(saludo + 'Te comparto las unidades de AORA Bella Vista que hablamos: ' + _url);
  window.open('https://wa.me/?text=' + msg, '_blank');
}

render();
</script>
</body>
</html>
