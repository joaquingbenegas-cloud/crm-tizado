<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM · Tizado Bella Vista</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #1a1a1a;
    --border: #222222;
    --gray: #8a8a8a;
    --gray2: #555555;
    --white: #ffffff;
    --red: #C8102E;
    --red-dim: rgba(200,16,46,0.15);
    --green: #22c55e;
    --yellow: #eab308;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--white); font-family: 'Inter', sans-serif; font-size: 14px; min-height: 100vh; }

  /* HEADER */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky; top: 0; z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-dot { width: 10px; height: 10px; background: var(--red); border-radius: 50%; }
  .logo h1 { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; letter-spacing: 0.02em; }
  .logo span { color: var(--gray); font-size: 12px; font-weight: 300; }
  .header-actions { display: flex; gap: 8px; align-items: center; }

  /* BUTTONS */
  .btn {
    padding: 8px 16px; border-radius: var(--radius); border: none; cursor: pointer;
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
    transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: var(--red); color: var(--white); }
  .btn-primary:hover { background: #a50d25; }
  .btn-ghost { background: transparent; color: var(--gray); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--gray2); color: var(--white); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-green { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
  .btn-green:hover { background: rgba(34,197,94,0.25); }
  .btn-wa { background: rgba(37,211,102,0.12); color: #25d366; border: 1px solid rgba(37,211,102,0.25); }
  .btn-wa:hover { background: rgba(37,211,102,0.22); }

  /* LAYOUT */
  .main { display: flex; height: calc(100vh - 60px); }
  .sidebar { width: 320px; min-width: 320px; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .detail { flex: 1; overflow-y: auto; }

  /* SEARCH & FILTERS */
  .search-area { padding: 16px; border-bottom: 1px solid var(--border); }
  .search-box {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 8px 12px;
  }
  .search-box input {
    flex: 1; background: none; border: none; color: var(--white); font-family: 'Inter', sans-serif; font-size: 13px; outline: none;
  }
  .search-box input::placeholder { color: var(--gray2); }
  .search-icon { color: var(--gray2); font-size: 14px; }

  .filters { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
  .filter-chip {
    padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--gray); font-size: 11px; cursor: pointer;
    font-family: 'Inter', sans-serif; transition: all 0.15s;
  }
  .filter-chip:hover { border-color: var(--gray2); color: var(--white); }
  .filter-chip.active { background: var(--red-dim); border-color: var(--red); color: var(--white); }

  .sort-row { display: flex; gap: 6px; margin-top: 8px; align-items: center; }
  .sort-row label { color: var(--gray); font-size: 11px; }
  .sort-select {
    background: var(--bg3); border: 1px solid var(--border); color: var(--gray); border-radius: 4px;
    padding: 3px 6px; font-size: 11px; font-family: 'Inter', sans-serif; cursor: pointer;
  }
  .sort-select:focus { outline: none; }
  .count-badge { margin-left: auto; color: var(--gray); font-size: 11px; }

  /* CONTACT LIST */
  .contact-list { flex: 1; overflow-y: auto; }
  .contact-list::-webkit-scrollbar { width: 4px; }
  .contact-list::-webkit-scrollbar-track { background: transparent; }
  .contact-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .contact-item {
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.1s; position: relative;
  }
  .contact-item:hover { background: var(--bg3); }
  .contact-item.active { background: var(--bg3); border-left: 2px solid var(--red); }
  .contact-item.notable::after {
    content: '★'; position: absolute; right: 12px; top: 12px;
    color: var(--yellow); font-size: 11px;
  }

  .ci-top { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
  .ci-name { font-weight: 500; font-size: 13px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ci-badge {
    padding: 2px 7px; border-radius: 3px; font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.05em; flex-shrink: 0;
  }
  .badge-compra { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .badge-venta { background: rgba(200,16,46,0.15); color: #f87171; }
  .badge-alquiler { background: rgba(168,85,247,0.15); color: #c084fc; }
  .badge-empty { background: var(--bg3); color: var(--gray); }

  .ci-desc { color: var(--gray); font-size: 11px; line-height: 1.4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ci-bottom { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
  .ci-date { color: var(--gray2); font-size: 10px; }
  .urgency-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .urgency-alta { background: var(--red); }
  .urgency-media { background: var(--yellow); }
  .urgency-baja { background: var(--gray2); }
  .contacted-today { color: var(--green); font-size: 10px; }
  .next-action-preview { color: #60a5fa; font-size: 10px; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* DETAIL PANEL */
  .detail-empty {
    height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
    color: var(--gray2);
  }
  .detail-empty-icon { font-size: 48px; opacity: 0.3; }
  .detail-empty p { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--gray2); }

  .detail-content { padding: 32px; max-width: 780px; }
  .detail-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; }
  .detail-name { font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 600; margin-bottom: 6px; }
  .detail-meta { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .detail-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* SECTIONS */
  .section { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
  .section-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--gray); margin-bottom: 14px; }

  .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .field { display: flex; flex-direction: column; gap: 4px; }
  .field label { font-size: 11px; color: var(--gray); text-transform: uppercase; letter-spacing: 0.06em; }
  .field input, .field select, .field textarea {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
    color: var(--white); padding: 8px 10px; font-family: 'Inter', sans-serif; font-size: 13px;
    outline: none; transition: border-color 0.15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--gray2); }
  .field textarea { resize: vertical; min-height: 70px; }
  .field select option { background: var(--bg2); }

  /* URGENCY SELECTOR */
  .urgency-selector { display: flex; gap: 8px; }
  .urgency-opt {
    padding: 6px 12px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--gray); font-size: 12px; cursor: pointer;
    font-family: 'Inter', sans-serif; transition: all 0.15s;
  }
  .urgency-opt.sel-alta { background: var(--red-dim); border-color: var(--red); color: var(--white); }
  .urgency-opt.sel-media { background: rgba(234,179,8,0.15); border-color: var(--yellow); color: var(--white); }
  .urgency-opt.sel-baja { background: rgba(138,138,138,0.1); border-color: var(--gray2); color: var(--white); }

  /* NOTES */
  .note-input-area { display: flex; gap: 8px; margin-bottom: 14px; }
  .note-input-area textarea {
    flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
    color: var(--white); padding: 8px 10px; font-family: 'Inter', sans-serif; font-size: 13px;
    outline: none; resize: none; min-height: 60px;
  }
  .note-input-area textarea:focus { border-color: var(--gray2); }
  .notes-list { display: flex; flex-direction: column; gap: 8px; }
  .note-item {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px;
  }
  .note-date { font-size: 10px; color: var(--gray2); margin-bottom: 4px; }
  .note-text { font-size: 13px; color: var(--white); line-height: 1.5; white-space: pre-wrap; }
  .notes-empty { color: var(--gray2); font-size: 13px; text-align: center; padding: 20px; }

  /* NEXT ACTION */
  .next-action-row { display: flex; gap: 8px; align-items: flex-end; }
  .next-action-row .field { flex: 1; }
  .next-action-display {
    background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.25);
    border-radius: 6px; padding: 10px 14px; display: flex; align-items: center; gap: 10px;
    margin-top: 10px;
  }
  .next-action-display span { flex: 1; font-size: 13px; }
  .next-action-display .nad { color: #60a5fa; font-size: 11px; }

  /* AI SECTION */
  .ai-section { }
  .ai-context-area {
    width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
    color: var(--white); padding: 10px; font-family: 'Inter', sans-serif; font-size: 13px;
    outline: none; resize: none; min-height: 60px; margin-bottom: 10px;
  }
  .ai-context-area:focus { border-color: var(--gray2); }
  .ai-output {
    background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
    padding: 14px; font-size: 13px; line-height: 1.7; white-space: pre-wrap;
    min-height: 80px; color: var(--white); display: none;
  }
  .ai-output.visible { display: block; }
  .ai-actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200;
    display: flex; align-items: center; justify-content: center; padding: 20px;
    display: none;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
    width: 100%; max-width: 500px; max-height: 80vh; overflow-y: auto;
  }
  .modal-header {
    padding: 20px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-header h2 { font-family: 'Playfair Display', serif; font-size: 18px; }
  .modal-close { background: none; border: none; color: var(--gray); cursor: pointer; font-size: 20px; line-height: 1; }
  .modal-body { padding: 24px; display: flex; flex-direction: column; gap: 14px; }
  .modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; }

  /* TOAST */
  #toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 300;
    background: var(--bg3); border: 1px solid var(--border); border-radius: 8px;
    padding: 12px 18px; font-size: 13px; display: flex; align-items: center; gap: 8px;
    transform: translateY(20px); opacity: 0; transition: all 0.2s; pointer-events: none;
  }
  #toast.show { transform: translateY(0); opacity: 1; }
  #toast.success { border-color: rgba(34,197,94,0.4); }
  #toast.error { border-color: rgba(200,16,46,0.4); }

  /* SYNC STATUS */
  .sync-status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--gray); }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gray2); }
  .sync-dot.synced { background: var(--green); }
  .sync-dot.syncing { background: var(--yellow); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* SCROLLBAR GLOBAL */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* RESPONSIVE HINT */
  @media (max-width: 768px) {
    .sidebar { width: 100%; }
    .detail { display: none; }
    .detail.mobile-show { display: block; }
    .sidebar.mobile-hide { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    <div>
      <h1>Tizado <span style="color:var(--red)">·</span> Bella Vista</h1>
      <span>CRM Inmobiliario</span>
    </div>
  </div>
  <div class="header-actions">
    <div class="sync-status">
      <div class="sync-dot" id="syncDot"></div>
      <span id="syncLabel">Sin sincronizar</span>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="syncToSheets()">↑ Sheets</button>
    <button class="btn btn-primary btn-sm" onclick="openNewContact()">+ Contacto</button>
  </div>
</header>

<div class="main">
  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="search-area">
      <div class="search-box">
        <span class="search-icon">⌕</span>
        <input type="text" id="searchInput" placeholder="Buscar contacto..." oninput="renderList()">
      </div>
      <div class="filters" id="filterChips">
        <button class="filter-chip active" data-filter="all" onclick="setFilter(this)">Todos</button>
        <button class="filter-chip" data-filter="Compra" onclick="setFilter(this)">Compra</button>
        <button class="filter-chip" data-filter="Venta" onclick="setFilter(this)">Venta</button>
        <button class="filter-chip" data-filter="Alquiler" onclick="setFilter(this)">Alquiler</button>
        <button class="filter-chip" data-filter="ALTA" onclick="setFilter(this)">🔴 Alta</button>
        <button class="filter-chip" data-filter="today" onclick="setFilter(this)">Hoy</button>
        <button class="filter-chip" data-filter="notable" onclick="setFilter(this)">★ Destacados</button>
      </div>
      <div class="sort-row">
        <label>Ordenar:</label>
        <select class="sort-select" id="sortSelect" onchange="renderList()">
          <option value="ultimo-desc">Más reciente</option>
          <option value="ultimo-asc">Más antiguo</option>
          <option value="nombre-asc">A → Z</option>
          <option value="urgencia">Urgencia</option>
        </select>
        <span class="count-badge" id="countBadge"></span>
      </div>
    </div>
    <div class="contact-list" id="contactList"></div>
  </div>

  <!-- DETAIL -->
  <div class="detail" id="detailPanel">
    <div class="detail-empty" id="detailEmpty">
      <div class="detail-empty-icon">🏠</div>
      <p>Seleccioná un contacto</p>
    </div>
    <div class="detail-content" id="detailContent" style="display:none"></div>
  </div>
</div>

<!-- MODAL NUEVO CONTACTO -->
<div class="modal-overlay" id="newContactModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Nuevo Contacto</h2>
      <button class="modal-close" onclick="closeNewContact()">×</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>Nombre *</label>
        <input type="text" id="nc_nombre" placeholder="Nombre del contacto">
      </div>
      <div class="field">
        <label>Teléfono</label>
        <input type="text" id="nc_tel" placeholder="549111234567">
      </div>
      <div class="field">
        <label>Interés en</label>
        <select id="nc_interes">
          <option value="">Sin categoría</option>
          <option value="Compra">Compra</option>
          <option value="Venta">Venta</option>
          <option value="Alquiler">Alquiler</option>
        </select>
      </div>
      <div class="field">
        <label>Descripción</label>
        <textarea id="nc_desc" placeholder="Qué busca, propiedades de interés..."></textarea>
      </div>
      <div class="field">
        <label>Presupuesto</label>
        <input type="text" id="nc_presupuesto" placeholder="$300.000">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeNewContact()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveNewContact()">Crear contacto</button>
    </div>
  </div>
</div>

<div id="toast"></div>

const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzb7MYnH34TTOfs6Uy9ZBg3KM32p4_1m2e6ggHV1ZtVhNwGRjpkhNeTlg-5Yxw9D9AWOA/exec';
const TODAY = new Date().toISOString().split('T')[0];

let contacts = [];
let selectedId = null;
let activeFilter = 'all';
let aiMessage = '';

// ─── INIT ────────────────────────────────────────────────────────────────────
function init() {
  const saved = localStorage.getItem('crm_contacts');
  if (saved) {
    contacts = JSON.parse(saved);
    // Merge any new BASE contacts not in saved
    BASE.forEach(b => {
      if (!contacts.find(c => c.nombre === b.nombre)) {
        contacts.push(Object.assign({ id: uid(), notes: [], contactedDates: [] }, b));
      }
    });
  } else {
    contacts = BASE.map(b => Object.assign({ id: uid(), notes: [], contactedDates: [] }, b));
  }
  save();
  renderList();
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }
function save() { localStorage.setItem('crm_contacts', JSON.stringify(contacts)); }
function getContact(id) { return contacts.find(c => c.id === id); }

// ─── LIST ────────────────────────────────────────────────────────────────────
function setFilter(el) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  activeFilter = el.dataset.filter;
  renderList();
}

function renderList() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const sort = document.getElementById('sortSelect').value;

  let list = contacts.filter(c => {
    const matchQ = !q || c.nombre.toLowerCase().includes(q) || (c.desc||'').toLowerCase().includes(q);
    let matchF = true;
    if (activeFilter === 'Compra') matchF = c.interesEn === 'Compra';
    else if (activeFilter === 'Venta') matchF = c.interesEn === 'Venta';
    else if (activeFilter === 'Alquiler') matchF = c.interesEn === 'Alquiler';
    else if (activeFilter === 'ALTA') matchF = c.urgencia === 'ALTA';
    else if (activeFilter === 'today') matchF = c.contactedDates && c.contactedDates.includes(TODAY);
    else if (activeFilter === 'notable') matchF = !!c.notable;
    return matchQ && matchF;
  });

  const urgOrder = { ALTA: 0, MEDIA: 1, BAJA: 2, undefined: 3 };
  if (sort === 'ultimo-desc') list.sort((a,b) => (b.ultimo||'').localeCompare(a.ultimo||''));
  else if (sort === 'ultimo-asc') list.sort((a,b) => (a.ultimo||'').localeCompare(b.ultimo||''));
  else if (sort === 'nombre-asc') list.sort((a,b) => a.nombre.localeCompare(b.nombre));
  else if (sort === 'urgencia') list.sort((a,b) => (urgOrder[a.urgencia]??3) - (urgOrder[b.urgencia]??3));

  document.getElementById('countBadge').textContent = list.length + ' contactos';

  const el = document.getElementById('contactList');
  el.innerHTML = list.map(c => {
    const isToday = c.contactedDates && c.contactedDates.includes(TODAY);
    const badgeClass = c.interesEn === 'Compra' ? 'badge-compra' : c.interesEn === 'Venta' ? 'badge-venta' : c.interesEn === 'Alquiler' ? 'badge-alquiler' : 'badge-empty';
    const urgClass = c.urgencia === 'ALTA' ? 'urgency-alta' : c.urgencia === 'MEDIA' ? 'urgency-media' : c.urgencia === 'BAJA' ? 'urgency-baja' : '';
    const fmtDate = c.ultimo ? formatDate(c.ultimo) : '';
    return `<div class="contact-item${c.id===selectedId?' active':''}${c.notable?' notable':''}" onclick="selectContact('${c.id}')">
      <div class="ci-top">
        <span class="ci-name">${esc(c.nombre)}</span>
        <span class="ci-badge ${badgeClass}">${c.interesEn||'—'}</span>
      </div>
      <div class="ci-desc">${esc(c.desc||'')}</div>
      <div class="ci-bottom">
        ${urgClass ? `<div class="urgency-dot ${urgClass}"></div>` : ''}
        <span class="ci-date">${fmtDate}</span>
        ${isToday ? '<span class="contacted-today">✓ Contactado hoy</span>' : ''}
        ${c.nextAction ? `<span class="next-action-preview">→ ${esc(c.nextAction)}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

function formatDate(d) {
  if (!d) return '';
  const [y,m,day] = d.split('-');
  return `${day}/${m}/${y}`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── DETAIL ──────────────────────────────────────────────────────────────────
function selectContact(id) {
  selectedId = id;
  renderList();
  renderDetail();
}

function updateField(id, field, value) {
  const c = getContact(id);
  if (!c) return;
  c[field] = value;
  if (field === 'nombre' || field === 'interesEn' || field === 'urgencia' || field === 'ultimo') {
    renderList();
  }
  save();
  toast('Guardado', 'success');
}

function setUrgency(id, val) {
  const c = getContact(id);
  if (!c) return;
  c.urgencia = val;
  save();
  renderList();
  renderDetail();
}

function markContactedToday(id) {
  const c = getContact(id);
  if (!c) return;
  if (!c.contactedDates) c.contactedDates = [];
  if (!c.contactedDates.includes(TODAY)) {
    c.contactedDates.push(TODAY);
    c.ultimo = TODAY;
  }
  save();
  renderList();
  renderDetail();
  toast('Marcado como contactado hoy ✓', 'success');
}

function toggleNotable(id) {
  const c = getContact(id);
  if (!c) return;
  c.notable = !c.notable;
  save();
  renderList();
  renderDetail();
}

function saveNextAction(id) {
  const c = getContact(id);
  if (!c) return;
  c.nextAction = document.getElementById('naText').value.trim();
  c.nextActionDate = document.getElementById('naDate').value;
  save();
  renderList();
  renderDetail();
  toast('Próxima acción guardada', 'success');
}

function addNote(id) {
  const c = getContact(id);
  if (!c) return;
  const text = document.getElementById('newNoteText').value.trim();
  if (!text) return;
  if (!c.notes) c.notes = [];
  const now = new Date();
  c.notes.push({
    id: uid(),
    text,
    date: now.toLocaleDateString('es-AR'),
    time: now.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit' })
  });
  save();
  renderDetail();
  toast('Nota agregada', 'success');
}

function deleteContact(id) {
  if (!confirm('¿Eliminar este contacto?')) return;
  contacts = contacts.filter(c => c.id !== id);
  selectedId = null;
  save();
  renderList();
  document.getElementById('detailEmpty').style.display = 'flex';
  document.getElementById('detailContent').style.display = 'none';
}

// ─── WHATSAPP ────────────────────────────────────────────────────────────────
function openWhatsApp(id) {
  const c = getContact(id);
  if (!c || !c.tel) { toast('Agregá el teléfono primero', 'error'); return; }
  const tel = c.tel.replace(/\D/g,'');
  window.open(`https://wa.me/${tel}`, '_blank');
}

function sendViaWhatsApp(id) {
  const c = getContact(id);
  if (!c) return;
  const msg = aiMessage || document.getElementById('aiOutput').textContent;
  if (!msg) { toast('Generá un mensaje primero', 'error'); return; }
  if (!c.tel) { toast('Agregá el teléfono del contacto', 'error'); return; }
  const tel = c.tel.replace(/\D/g,'');
  window.open(`https://wa.me/${tel}?text=${encodeURIComponent(msg)}`, '_blank');
}

function copyAiMessage() {
  const msg = aiMessage || document.getElementById('aiOutput').textContent;
  navigator.clipboard.writeText(msg).then(() => toast('Copiado al portapapeles', 'success'));
}

// ─── AI ──────────────────────────────────────────────────────────────────────
function generateAI(id, type) {
  const c = getContact(id);
  if (!c) return;

  const context = document.getElementById('aiContext').value.trim();

  const typeLabels = {
    'check-in': 'check-in / seguimiento cálido',
    'novedad': 'presentar una novedad de propiedad relevante',
    'reactivar': 'reactivar el contacto que no responde hace tiempo',
    'captar': 'captar al contacto para trabajar con Tizado en exclusiva'
  };

  const notas = (c.notes || []).length > 0
    ? '\nNotas previas: ' + [...c.notes].slice(-3).map(n => `[${n.date}] ${n.text}`).join(' | ')
    : '';

  const prompt = `Soy Joaquín González Benegas, asesor inmobiliario de Tizado Bella Vista. Escribime un mensaje de WhatsApp para ${c.nombre}, que está interesado en ${c.interesEn || 'una operación inmobiliaria'}.

Descripción: ${c.desc || 'Sin descripción'}${c.presupuesto ? `\nPresupuesto: ${c.presupuesto}` : ''}${c.urgencia ? `\nUrgencia: ${c.urgencia}` : ''}
Último contacto: ${c.ultimo ? formatDate(c.ultimo) : 'No registrado'}${notas}${context ? `\nContexto extra: ${context}` : ''}

Tono: ${typeLabels[type]}.

El mensaje tiene que ser en español rioplatense, máximo 4 líneas, directo y cálido, sin sonar a agencia. Sin asteriscos ni markdown. Firmá como "Joaquín - Tizado Bella Vista". Solo el texto del mensaje, sin explicaciones.`;

  window.open('https://claude.ai/new?q=' + encodeURIComponent(prompt), '_blank');
  toast('Abriendo Claude con el prompt ✓', 'success');
}

// ─── NEW CONTACT MODAL ───────────────────────────────────────────────────────
function openNewContact() {
  document.getElementById('newContactModal').classList.add('open');
}
function closeNewContact() {
  document.getElementById('newContactModal').classList.remove('open');
  ['nc_nombre','nc_tel','nc_desc','nc_presupuesto'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('nc_interes').value = '';
}
function saveNewContact() {
  const nombre = document.getElementById('nc_nombre').value.trim();
  if (!nombre) { toast('El nombre es obligatorio', 'error'); return; }
  const c = {
    id: uid(),
    nombre,
    tel: document.getElementById('nc_tel').value.trim(),
    interesEn: document.getElementById('nc_interes').value,
    desc: document.getElementById('nc_desc').value.trim(),
    presupuesto: document.getElementById('nc_presupuesto').value.trim(),
    ultimo: TODAY,
    notes: [],
    contactedDates: []
  };
  contacts.unshift(c);
  save();
  renderList();
  closeNewContact();
  selectContact(c.id);
  toast('Contacto creado', 'success');
}

// ─── GOOGLE SHEETS ───────────────────────────────────────────────────────────
async function syncToSheets() {
  const dot = document.getElementById('syncDot');
  const label = document.getElementById('syncLabel');
  dot.className = 'sync-dot syncing';
  label.textContent = 'Sincronizando...';
  try {
    const payload = contacts.map(c => ({
      id: c.id,
      nombre: c.nombre,
      tel: c.tel || '',
      interesEn: c.interesEn || '',
      desc: c.desc || '',
      presupuesto: c.presupuesto || '',
      urgencia: c.urgencia || '',
      ultimo: c.ultimo || '',
      nextAction: c.nextAction || '',
      nextActionDate: c.nextActionDate || '',
      notable: c.notable ? 'Sí' : '',
      notas: (c.notes||[]).map(n => `[${n.date} ${n.time}] ${n.text}`).join(' | ')
    }));
    await fetch(SHEETS_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contacts: payload })
    });
    dot.className = 'sync-dot synced';
    label.textContent = 'Sincronizado ' + new Date().toLocaleTimeString('es-AR', {hour:'2-digit',minute:'2-digit'});
    toast('Datos enviados a Google Sheets ✓', 'success');
  } catch (e) {
    dot.className = 'sync-dot';
    label.textContent = 'Error de sincronización';
    toast('Error al sincronizar: ' + e.message, 'error');
  }
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 2800);
}

// ─── START ───────────────────────────────────────────────────────────────────
init();
</script>
