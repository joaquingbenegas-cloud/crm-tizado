<style>
  :root {
    --bg: #f5f5f5;
    --bg2: #ffffff;
    --bg3: #f0f0f0;
    --border: #e0e0e0;
    --gray: #666666;
    --gray2: #999999;
    --text: #1a1a1a;
    --red: #C8102E;
    --red-dim: rgba(200,16,46,0.08);
    --green: #16a34a;
    --yellow: #ca8a04;
    --radius: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; min-height: 100vh; }

  header {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 0 24px; display: flex; align-items: center; justify-content: space-between;
    height: 60px; position: sticky; top: 0; z-index: 100;
  }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo-dot { width: 10px; height: 10px; background: var(--red); border-radius: 50%; }
  .logo h1 { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; letter-spacing: 0.02em; }
  .logo span { color: var(--gray); font-size: 12px; font-weight: 300; }

  .btn {
    padding: 8px 16px; border-radius: var(--radius); border: none; cursor: pointer;
    font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
    transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; text-decoration: none;
  }
  .btn-ghost { background: transparent; color: var(--gray); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--gray2); color: var(--text); }
  .btn-sm { padding: 5px 10px; font-size: 12px; }
  .btn-wa { background: rgba(37,211,102,0.12); color: #16a34a; border: 1px solid rgba(37,211,102,0.25); }
  .btn-wa:hover { background: rgba(37,211,102,0.22); }
  .btn-red { background: var(--red); color: #fff; }
  .btn-red:hover { background: #a50d25; }

  .toolbar {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    background: var(--bg2); position: sticky; top: 60px; z-index: 90;
  }
  .search-box {
    display: flex; align-items: center; gap: 8px; max-width: 280px;
    background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 8px 12px;
  }
  .search-box input { flex: 1; background: none; border: none; color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; outline: none; }
  .search-box input::placeholder { color: var(--gray2); }

  .filter-chip {
    padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--gray); font-size: 11px; cursor: pointer;
    font-family: 'Inter', sans-serif; transition: all 0.15s; text-decoration: none; display: inline-block;
  }
  .filter-chip:hover { border-color: var(--gray2); color: var(--text); }
  .filter-chip.active { background: var(--red-dim); border-color: var(--red); color: var(--text); }

  .props-count { color: var(--gray); font-size: 12px; white-space: nowrap; margin-left: auto; }

  .grid-wrap { padding: 20px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }

  .prop-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; transition: box-shadow 0.15s;
  }
  .prop-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
  .prop-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 4px; }
  .prop-card-dir { font-weight: 600; font-size: 13px; flex: 1; line-height: 1.4; }
  .prop-price { font-weight: 700; font-size: 14px; color: var(--red); flex-shrink: 0; }
  .prop-meta { color: var(--gray); font-size: 11px; margin-bottom: 10px; line-height: 1.5; }
  .prop-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
  .prop-tag {
    padding: 2px 7px; border-radius: 3px; font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.04em;
  }
  .tag-venta { background: rgba(200,16,46,0.1); color: var(--red); }
  .tag-alquiler { background: rgba(126,34,206,0.1); color: #7c3aed; }
  .tag-casa { background: rgba(59,130,246,0.1); color: #1d4ed8; }
  .tag-terreno { background: rgba(22,163,74,0.1); color: var(--green); }
  .tag-depto { background: rgba(234,179,8,0.12); color: var(--yellow); }
  .tag-local { background: rgba(100,116,139,0.12); color: #475569; }
  .prop-actions { display: flex; gap: 6px; flex-wrap: wrap; }

  .share-bar {
    background: var(--red-dim); border-bottom: 1px solid rgba(200,16,46,0.15);
    padding: 10px 20px; display: none; align-items: center; gap: 10px; flex-wrap: wrap;
  }
  .share-bar.show { display: flex; }
  .share-bar span { font-size: 12px; color: var(--gray); }
  .share-bar strong { color: var(--red); font-size: 13px; }
  .share-bar .url { font-size: 11px; color: var(--gray); flex: 1; word-break: break-all; }
  .copy-btn { padding: 5px 12px; border-radius: 6px; background: var(--red); color: #fff; border: none; font-size: 12px; cursor: pointer; font-family: 'Inter', sans-serif; }

  .state-msg { grid-column: 1/-1; text-align: center; padding: 60px; color: var(--gray); }
  .state-msg p { font-size: 18px; font-family: 'Playfair Display', serif; }

  @media (max-width: 600px) {
    .toolbar { padding: 12px; gap: 6px; }
    .grid-wrap { padding: 12px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>

  'https://www.zonaprop.com.ar/propiedades/clasificado/veclcain-casa-en-venta-en-buenos-aires-golf-bella-vista-san-58967171.html',
  'https://www.zonaprop.com.ar/propiedades/clasificado/veclcain-casa-en-venta-barrio-buenos-aires-golf-bella-vista-58327617.html',

];

let properties = [];
let op = '', tipo = '', barrio = '';

// Leer params de URL al cargar
const p = new URLSearchParams(location.search);
op = p.get('op') || '';
tipo = p.get('tipo') || '';
barrio = p.get('barrio') || '';

function slugify(str) {
  return (str||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9\s]/g,'').trim().replace(/\s+/g,'-');
}
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function findZpUrl(prop) {
  if (prop['URL ZonaProp'] && prop['URL ZonaProp'].startsWith('http')) return prop['URL ZonaProp'];
  const t = (prop['Tipo Propiedad']||'').toLowerCase();
  const prefix = t.includes('casa') ? 'veclcain' : (t.includes('terreno')||t.includes('lote')) ? 'vecltrin' : t.includes('depto')||t.includes('departamento') ? 'veclapin' : null;
  const kws = [...new Set([...slugify(prop['Dirección']||'').split('-'), ...slugify(prop['Ubicación']||'').split('-'), ...slugify(prop['Calle Referencia']||'').split('-')].filter(w=>w.length>3))];
  const cands = ZP_URLS.filter(u => !prefix || u.includes(prefix));
  if (!cands.length) return null;
  const best = cands.map(u => ({ u, s: kws.reduce((acc,kw)=>acc+(u.includes(kw)?1:0),0) })).sort((a,b)=>b.s-a.s)[0];
  return best.s > 0 ? best.u : cands[0];
}

function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).map(line => {
    const cols=[]; let cur='', inQ=false;
    for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){inQ=!inQ;}else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}else{cur+=ch;}}
    cols.push(cur.trim());
    const obj={};
    headers.forEach((h,i)=>obj[h]=(cols[i]||'').replace(/^"|"$/g,'').trim());
    return obj;
  }).filter(r=>r['Codigo']&&r['Codigo']!=='Codigo');
}

async function loadProps() {
  document.getElementById('grid').innerHTML = '<div class="state-msg"><p>Cargando...</p></div>';
  try {
    const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv`);
    properties = parseCSV(await res.text());
    render();
  } catch(e) {
    document.getElementById('grid').innerHTML = `<div class="state-msg"><p>Error al cargar</p><small>${e.message}</small></div>`;
  }
}

function tagClass(tipo) {
  const t=(tipo||'').toLowerCase();
  return t.includes('casa')?'tag-casa':t.includes('terreno')||t.includes('lote')?'tag-terreno':t.includes('depto')||t.includes('departamento')?'tag-depto':t.includes('local')?'tag-local':'tag-casa';
}

function render() {
  const q = (document.getElementById('searchInput').value||'').toLowerCase();
  const list = properties.filter(prop => {
    const opOk = !op || (prop['Operación']||'').includes(op);
    const tipoOk = !tipo || (prop['Tipo Propiedad']||'').toLowerCase().includes(tipo.toLowerCase());
    const hay = (slugify(prop['Dirección']||'')+' '+slugify(prop['Ubicación']||'')+' '+slugify(prop['Calle Referencia']||'')).toLowerCase();
    const barrioOk = !barrio || hay.includes(barrio.replace(/-/g,' '));
    const qOk = !q || hay.includes(q) || (prop['Precio']||'').toLowerCase().includes(q);
    return opOk && tipoOk && barrioOk && qOk;
  });

  document.getElementById('propsCount').textContent = list.length + ' propiedades';
  updateChips();
  updateShareBar();

  if (!list.length) {
    document.getElementById('grid').innerHTML = '<div class="state-msg"><p>Sin resultados</p></div>';
    return;
  }

  document.getElementById('grid').innerHTML = list.map(prop => {
    const zpUrl = findZpUrl(prop);
    const opTag = (prop['Operación']||'').includes('Alquiler') ? 'tag-alquiler' : 'tag-venta';
    const details = [prop['Ambientes']?prop['Ambientes']+' amb.':'', prop['Dormitorios']?prop['Dormitorios']+' dorm.':'', prop['Baños']?prop['Baños']+' baños':'', prop['Cocheras']?prop['Cocheras']+' coch.':'', prop['Superficie']?prop['Superficie']+' m²':''].filter(Boolean).join(' · ');
    const waMsg = encodeURIComponent(`Hola Joaquín, vi la propiedad en ${prop['Dirección']}, ${prop['Ubicación']} (${prop['Precio']}) y quería más info.`);
    return `<div class="prop-card">
      <div class="prop-card-top">
        <span class="prop-card-dir">${esc(prop['Dirección']||'')} · ${esc(prop['Ubicación']||'')}</span>
        <span style="font-weight:700;font-size:14px;color:var(--red);flex-shrink:0">${esc(prop['Precio']||'Consultar')}</span>
      </div>
      <div class="prop-meta">${esc(prop['Codigo']||'')}${details?' · '+esc(details):''}</div>
      <div class="prop-tags">
        <span class="prop-tag ${opTag}">${esc(prop['Operación']||'')}</span>
        <span class="prop-tag ${tagClass(prop['Tipo Propiedad'])}">${esc(prop['Tipo Propiedad']||'')}</span>
        ${prop['Estado Inmueble']?`<span class="prop-tag" style="background:var(--bg3);color:var(--gray)">${esc(prop['Estado Inmueble'])}</span>`:''}
      </div>
      <div class="prop-actions">
        ${zpUrl?`<a href="${zpUrl}" target="_blank" class="btn btn-ghost btn-sm">🔍 Ver fotos</a>`:''}
        <a href="https://wa.me/${WA}?text=${waMsg}" target="_blank" class="btn btn-wa btn-sm">💬 Consultar</a>
      </div>
    </div>`;
  }).join('');
}

function updateChips() {
  document.querySelectorAll('[data-op]').forEach(el => el.classList.toggle('active', el.dataset.op === op));
  document.querySelectorAll('[data-tipo]').forEach(el => el.classList.toggle('active', el.dataset.tipo === tipo));
  document.querySelectorAll('[data-barrio]').forEach(el => el.classList.toggle('active', el.dataset.barrio === barrio));
}

function updateShareBar() {
  const params = new URLSearchParams();
  if (op) params.set('op', op);
  if (tipo) params.set('tipo', tipo);
  if (barrio) params.set('barrio', barrio);
  const qs = params.toString();
  const url = location.origin + location.pathname + (qs ? '?' + qs : '');
  history.replaceState(null, '', qs ? '?' + qs : location.pathname);
  const banner = document.getElementById('shareBanner');
  if (qs) {
    banner.classList.add('show');
    document.getElementById('shareUrl').textContent = url;
  } else {
    banner.classList.remove('show');
  }
}

function setOp(val) { op = op===val?'':val; render(); }
function setTipo(val) { tipo = tipo===val?'':val; render(); }
function setBarrio(val) { barrio = barrio===val?'':val; render(); }

function copyUrl() {
  navigator.clipboard.writeText(location.href).then(()=>{
    const btn = document.querySelector('.copy-btn');
    btn.textContent='✓ Copiado';
    setTimeout(()=>btn.textContent='Copiar',2000);
  });
}

loadProps();
</script>
</body>
</html>
